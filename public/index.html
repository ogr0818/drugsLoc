<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>住院儲位</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="card">
      <form class="query-row" autocomplete="off" id="query-form">
        <label class="bar-cord">藥品代碼：
          <input
            type="text"
            name="code"
            class="code-input"
            placeholder="請輸入藥品代碼"
            autofocus
          >
          <button type="submit" class="submit-btn">查詢</button>
        </label>
      </form>

      <div class="status-row">
        <div class="status-box neutral" id="status-box">資料來源：drugs.xls</div>
      </div>

      <div class="map-wrap">
        <div class="map-row map-row-8"><div class="slot" data-location="8-6">8-6</div><div class="slot" data-location="7-6">7-6</div><div class="slot" data-location="6-6">6-6</div><div class="slot" data-location="5-6">5-6</div><div class="slot" data-location="4-6">4-6</div><div class="slot" data-location="3-6">3-6</div><div class="slot" data-location="2-6">2-6</div><div class="slot" data-location="1-6">1-6</div></div>
        <div class="map-row map-row-8"><div class="slot" data-location="8-5">8-5</div><div class="slot" data-location="7-5">7-5</div><div class="slot" data-location="6-5">6-5</div><div class="slot" data-location="5-5">5-5</div><div class="slot" data-location="4-5">4-5</div><div class="slot" data-location="3-5">3-5</div><div class="slot" data-location="2-5">2-5</div><div class="slot" data-location="1-5">1-5</div></div>
        <div class="map-row map-row-8"><div class="slot" data-location="8-4">8-4</div><div class="slot" data-location="7-4">7-4</div><div class="slot" data-location="6-4">6-4</div><div class="slot" data-location="5-4">5-4</div><div class="slot" data-location="4-4">4-4</div><div class="slot" data-location="3-4">3-4</div><div class="slot" data-location="2-4">2-4</div><div class="slot" data-location="1-4">1-4</div></div>
        <div class="map-row map-row-8"><div class="slot" data-location="8-3">8-3</div><div class="slot" data-location="7-3">7-3</div><div class="slot" data-location="6-3">6-3</div><div class="slot" data-location="5-3">5-3</div><div class="slot" data-location="4-3">4-3</div><div class="slot" data-location="3-3">3-3</div><div class="slot" data-location="2-3">2-3</div><div class="slot" data-location="1-3">1-3</div></div>
        <div class="map-row map-row-8"><div class="slot" data-location="8-2">8-2</div><div class="slot" data-location="7-2">7-2</div><div class="slot" data-location="6-2">6-2</div><div class="slot" data-location="5-2">5-2</div><div class="slot" data-location="4-2">4-2</div><div class="slot" data-location="3-2">3-2</div><div class="slot" data-location="2-2">2-2</div><div class="slot" data-location="1-2">1-2</div></div>
        <div class="map-row map-row-8"><div class="slot" data-location="8-1">8-1</div><div class="slot" data-location="7-1">7-1</div><div class="slot" data-location="6-1">6-1</div><div class="slot" data-location="5-1">5-1</div><div class="slot" data-location="4-1">4-1</div><div class="slot" data-location="3-1">3-1</div><div class="slot" data-location="2-1">2-1</div><div class="slot" data-location="1-1">1-1</div></div>
        <div class="front-rack" data-location="層架">層架</div>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
